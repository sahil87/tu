project:
  name: "{PROJECT_NAME}"
  description: "{PROJECT_DESCRIPTION}"

# Directories containing implementation code (relative to repo root).
source_paths:
  - {SOURCE_PATHS}

# Project-specific categories appended to default checklist categories.
# Defaults: functional_completeness, behavioral_correctness, scenario_coverage, edge_cases, security
checklist:
  extra_categories: []

# Per-stage directives for artifact generation.
# Each stage key accepts a list of instructions the agent follows during generation.
stage_directives:
  intake: []
  spec:
    - Use GIVEN/WHEN/THEN for scenarios
    - "Mark ambiguities with [NEEDS CLARIFICATION]"
  tasks: []
  apply: []
  review: []
  hydrate: []

# Pre/post shell commands per pipeline stage.
# Pre hooks run before a stage starts — failure blocks the stage.
# Post hooks run after a stage completes — failure fails the stage.
# Commands execute via sh -c with the repo root as working directory.
# Supports shell commands and script paths.
# stage_hooks:
#   review:
#     pre: "cargo test"
#   apply:
#     post: "cargo clippy -- -D warnings"
